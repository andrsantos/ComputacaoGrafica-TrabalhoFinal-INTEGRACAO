version: '3.8'

services:
  backend:
    build:
      context: ./CG-TrabalhoFinal/CG-TrabalhoFinal
    container_name: cg_backend
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./ComputacaoGrafica-TrabalhoFinal-FRONTEND/cg-frontend
    container_name: cg_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./ComputacaoGrafica-TrabalhoFinal-FRONTEND/cg-frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped

    